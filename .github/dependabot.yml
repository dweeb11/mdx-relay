version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 3
    groups:
      test-toolchain:
        patterns:
          - vitest
          - "@vitest/*"
      lint-toolchain:
        patterns:
          - eslint
          - "@eslint/*"
          - typescript-eslint
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
